manifestVersion: 1
id: mav-bittrack
name: BitTrack
version: "1.0.1"
tagline: Bitcoin Wallet Monitor
category: bitcoin
description: >-
  BitTrack is a full-featured dashboard for real-time Bitcoin wallet monitoring.
  Track balances, recent transactions, and the complete history of multiple wallets
  simultaneously, all within a clean and responsive interface. Receive instant
  movement alerts via Telegram and/or Ntfy, staying informed about your holdings
  without relying on exchanges or third-party services.
releaseNotes: >-
  🚀 Initial release of BitTrack v1.0.1. This version includes real-time monitoring
  of multiple Bitcoin wallets, full transaction history, Telegram and Ntfy push
  notifications, and an intuitive browser-based dashboard.
developer: Maverick
website: https://github.com/maverick-2009/BitTrack
support: https://github.com/maverick-2009/BitTrack/issues
repo: https://github.com/maverick-2009/BitTrack
icon: https://raw.githubusercontent.com/maverick-2009/BitTrack/refs/heads/main/img/icon.png
port: 8585
gallery:
  - https://raw.githubusercontent.com/maverick-2009/BitTrack/refs/heads/main/img/screenshot1.png
  - https://raw.githubusercontent.com/maverick-2009/BitTrack/refs/heads/main/img/screenshot2.png

dependencies: []
path: ""
defaultUsername: ""
defaultPassword: "admin"
